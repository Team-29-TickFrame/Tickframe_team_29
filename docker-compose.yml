services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: tickframe
      POSTGRES_USER: tickframe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - tickframe-timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickframe -d tickframe"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://tickframe:${POSTGRES_PASSWORD}@timescaledb:5432/tickframe
      TICKFRAME_BINANCE_REST_URLS: ${TICKFRAME_BINANCE_REST_URLS:-}
      TICKFRAME_BINANCE_WS_URLS: ${TICKFRAME_BINANCE_WS_URLS:-}
      TICKFRAME_BYBIT_REST_URLS: ${TICKFRAME_BYBIT_REST_URLS:-}
      TICKFRAME_BYBIT_WS_URLS: ${TICKFRAME_BYBIT_WS_URLS:-}
      TICKFRAME_DISABLE_RECOVERY_BACKFILL: ${TICKFRAME_DISABLE_RECOVERY_BACKFILL:-0}
      TICKFRAME_RECOVERY_BACKFILL_HOURS: ${TICKFRAME_RECOVERY_BACKFILL_HOURS:-72}
      TICKFRAME_BINANCE_1S_BACKFILL_HOURS: ${TICKFRAME_BINANCE_1S_BACKFILL_HOURS:-24}
      TICKFRAME_SECOND_REPAIR_HOURS: ${TICKFRAME_SECOND_REPAIR_HOURS:-72}
      TICKFRAME_STABLE_CHART_DELAY_MS: ${TICKFRAME_STABLE_CHART_DELAY_MS:-2000}
      TICKFRAME_PATTERN_CONFIDENCE_THRESHOLD: ${TICKFRAME_PATTERN_CONFIDENCE_THRESHOLD:-0.45}
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4173}:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - tickframe-prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-tickframe}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - tickframe-grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  tickframe-timescale-data:
  tickframe-prometheus-data:
  tickframe-grafana-data:
