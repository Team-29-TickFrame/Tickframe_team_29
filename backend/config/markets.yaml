config_version: "1.0.0"
market_type: spot
base_timeframe: 1s
allowed_lateness_ms: 10000
raw_trade_retention_hours: 72

exchanges:
  binance:
    websocket_urls:
      - wss://data-stream.binance.vision/stream
      - wss://stream.binance.com:9443/stream
      - wss://stream.binance.com:443/stream
  bybit:
    websocket_urls:
      - wss://stream.bybit.com/v5/public/spot
      - wss://stream.bytick.com/v5/public/spot
      - wss://stream.bybit-tr.com/v5/public/spot
      - wss://stream.bybit.kz/v5/public/spot
      - wss://stream.bybitgeorgia.ge/v5/public/spot

