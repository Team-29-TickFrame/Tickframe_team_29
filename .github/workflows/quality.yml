name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend lint, tests, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Lint backend and ML code
        run: ruff check backend ml

      - name: Check backend and ML formatting
        run: ruff format --check backend ml

      - name: Run backend tests with coverage
        run: |
          coverage run --source=backend.app,ml.pattern_recognition -m unittest discover -s backend/tests
          coverage report --show-missing
          coverage json -o coverage.json
          python backend/scripts/check_critical_coverage.py coverage.json
          coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  additional-qa:
    name: Additional QA - datetime safety analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install QA dependencies
        run: python -m pip install "ruff>=0.8,<1"

      - name: Run Ruff datetime safety rules
        run: ruff check --select DTZ backend/app ml/pattern_recognition
