name: Links

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - "lychee.toml"
      - ".lycheeignore"

  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - "lychee.toml"
      - ".lycheeignore"

  workflow_dispatch:

jobs:
  lychee:
    name: Lychee link check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir "${{ github.workspace }}" --verbose --no-progress './**/*.md'
          format: markdown
          output: lychee-report.md
          fail: true